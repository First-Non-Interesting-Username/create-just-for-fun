name: Update mods

on:
  workflow_dispatch:
  schedule:
    - cron: '45 17 * * 4'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
     - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

     - name: Update mods
       uses: hudsonm62/packwiz-action@538bcd35d3a4810f35ef6f51b0b65be8191b28bf # v1
       with:
        args: update --all -y
    
     - name: Setup taplo
       uses: uncenter/setup-taplo@b18c8c8302695fe63d6853bc004006215ac52b91 # v2
       with:
        version: "0.10.0"

     - name: Run taplo fmt
       run: taplo fmt

     - name: Run test workflow
       run: |
          gh workflow run test.yaml --ref ${{ github.ref }}
          sleep 5
          run_id=$(gh run list --workflow=test.yaml --limit=1 --json databaseId -q '.[0].databaseId')
          gh run watch "$run_id" --exit-status

     - name: Bump pack version
       run: |
          NEW_VERSION=$(date -u +"%Y.%V")
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pack.toml
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV


     - name: Create Pull Request
       uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
       with:
         token: ${{ secrets.GITHUB_TOKEN }}
         commit-message: "chore(deps): update mods"
         title: "chore(deps): update mods"
         body: "This PR contains updated mods via `packwiz update --all`"
         branch: "chore(deps)/update-mods"
         base: "main"